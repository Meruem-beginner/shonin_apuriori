<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポータルサイト</title>

<style>
body{
    font-family: sans-serif;
    background:#111827;
    color:white;
    text-align:center;
    padding:50px;
}

h1{
    margin-bottom:40px;
}

.container{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    width:250px;
    background:#1f2937;
    border-radius:15px;
    padding:30px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

a{
    text-decoration:none;
    color:white;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#2563eb;
    border-radius:8px;
}
</style>

</head>
<body>

<h1>横山修斗 開発ポータル</h1>

<div class="container">

    <div class="card">
        <h2>岸との遭遇</h2>
        <p>プロジェクト1</p>
        <p href="https://meruem-beginner.github.io/kishitonosouguu/" class="btn">
            開く
        </a>
    </div>

    <div class="card">
        <h2>偉大航路</h2>
        <p>プロジェクト2</p>
        <p href="https://meruem-beginner.github.io/kishitonosouguu/" class="btn">
            開く
        </a>
    </div>

    <div class="card">
        <h2>僕女転校</h2>
        <p>プロジェクト3</p>
        <p href="https://meruem-beginner.github.io/kishitonosouguu/" class="btn">
            開く
        </a>
    </div>

</div>

</body>
</html>
